name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Ensure a Pages site exists (creates it as workflow type if missing).
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # configure-pages only CREATES a site; it won't convert an existing
      # "Deploy from a branch" (legacy) source. This explicit PUT forces the
      # build type to "workflow", which permanently disables GitHub's automatic
      # branch/Jekyll build that otherwise serves README.md at the root.
      #
      # NOTE: changing the Pages *source* requires ADMIN permission, which the
      # default GITHUB_TOKEN cannot have. To make this work, add a repo secret
      # named PAGES_TOKEN = a Personal Access Token with admin rights on this
      # repo (classic token with the `repo` scope). Without it, this step is a
      # harmless no-op and you must set Source = "GitHub Actions" once in the UI.
      - name: Force Pages source to GitHub Actions
        env:
          TOKEN: ${{ secrets.PAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      # GitHub Pages has no server-side routing. Copying index.html to 404.html
      # lets the Angular SPA boot and resolve deep links (e.g. /insights/<slug>).
      - name: Add SPA fallback
        run: cp dist/lax-portfolio-website/browser/index.html dist/lax-portfolio-website/browser/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/lax-portfolio-website/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
